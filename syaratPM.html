<!DOCTYPE html>
<html lang="id">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Syarat Pengaduan</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{background:#eaf3ff;font-family:Arial;padding-top:120px;}
.header{position:fixed;top:0;width:100%;background:#0b3b7a;color:white;text-align:center;padding:20px;}
.card{border:none;border-radius:15px;}
</style>
</head>

<body>

<div class="header">
  <h3>Syarat Pengaduan</h3>
</div>

<div class="container">
<div class="card p-4">

<h4 id="judul">Syarat</h4>

<ul id="isi"><li>Loading...</li></ul>

<a href="PM.html" class="btn btn-primary mt-3">⬅ Kembali</a>

</div>
</div>

<script>
const l = new URLSearchParams(location.search).get("layanan");

const j = document.getElementById("judul");
const i = document.getElementById("isi");

if(l==="infrastruktur"){
j.innerText="🛣️ Infrastruktur";
i.innerHTML=`<li>Foto lokasi</li><li>Deskripsi masalah</li>`;
}
else if(l==="lingkungan"){
j.innerText="🗑️ Lingkungan";
i.innerHTML=`<li>Foto sampah</li><li>Lokasi</li>`;
}
else if(l==="pelayanan"){
j.innerText="🏢 Pelayanan";
i.innerHTML=`<li>Detail keluhan</li>`;
}
else if(l==="aspirasi"){
j.innerText="📢 Aspirasi";
i.innerHTML=`<li>Isi saran</li>`;
}
else if(l==="tracking"){
j.innerText="📊 Tracking";
i.innerHTML=`<li>Nomor laporan</li>`;
}
</script>

</body>
</html>
