<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form Pengajuan Perizinan Usaha</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-color: #eaf3ff;
      font-family: Arial;
      padding: 40px;
    }

    .box {
      max-width: 850px;
      margin: auto;
      background: white;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }

    .title {
      text-align: center;
      font-weight: bold;
      color: #1565c0;
      margin-bottom: 20px;
    }

    .done {
      display: none;
      background: #d1e7dd;
      color: #0f5132;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
      font-weight: bold;
      margin-top: 15px;
    }
  </style>
</head>

<body>

<div class="box">

  <h3 class="title" id="judul">Form Pengajuan Perizinan Usaha</h3>

  <form id="formAjukan">

    <div class="row">

      <div class="col-md-6 mb-3">
        <label>👤 Nama Lengkap</label>
        <input type="text" class="form-control" required>
      </div>

      <div class="col-md-6 mb-3">
        <label>🪪 NIK</label>
        <input type="text" class="form-control" required>
      </div>

      <div class="col-md-6 mb-3">
        <label>📱 No HP</label>
        <input type="tel" class="form-control" required>
      </div>

      <div class="col-md-6 mb-3">
        <label>📍 Alamat</label>
        <input type="text" class="form-control" required>
      </div>

      <div class="col-12 mb-3">
        <label>📌 Jenis Layanan</label>
        <input type="text" class="form-control" id="layananText" readonly>
      </div>

      <!-- AREA UPLOAD -->
      <div id="uploadArea"></div>

      <div class="col-12 mb-3">
        <input type="checkbox" required>
        <label>Data yang saya isi benar</label>
      </div>

      <div class="col-12 d-grid gap-2">
        <button class="btn btn-primary">Kirim Pengajuan</button>
        <button type="reset" class="btn btn-secondary">Reset</button>
      </div>

    </div>

  </form>

  <div class="done" id="doneBox">
  <h5>🎉 Pengajuan Berhasil Dikirim!</h5>

  <p>Silakan menunggu proses verifikasi oleh petugas.</p>

  <p>
    Nomor Pengajuan Anda:
    <br>
    <strong id="nomorPengajuan"></strong>
  </p>

  <small>
    Simpan nomor pengajuan ini untuk mengecek status layanan.
  </small>
</div>
</div>


</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const layanan = params.get("layanan");

  const judul = document.getElementById("judul");
  const layananText = document.getElementById("layananText");
  const uploadArea = document.getElementById("uploadArea");

  layananText.value = layanan;

  let html = "";

/* ================= NIB ================= */
if (layanan === "nib") {
  judul.innerText = "Formulir Nomor Induk Berusaha (NIB)";
  html = `
    <div class="mb-3"><label>📄 Upload KTP</label>
      <input type="file" class="form-control" required></div>

    <div class="mb-3"><label>📄 Upload NPWP (opsional)</label>
      <input type="file" class="form-control"></div>

    <div class="mb-3"><label>🏪 Nama Usaha</label>
      <input type="text" class="form-control" required></div>
  `;
}

/* ================= IUMK ================= */
else if (layanan === "iumk") {
  judul.innerText = "Formulir Izin Usaha Mikro Kecil (IUMK)";
  html = `
    <div class="mb-3"><label>📄 Upload KTP</label>
      <input type="file" class="form-control" required></div>

    <div class="mb-3"><label>📄 Upload KK</label>
      <input type="file" class="form-control" required></div>

    <div class="mb-3"><label>🏪 Foto Usaha</label>
      <input type="file" class="form-control" required></div>
  `;
}

/* ================= SKU ================= */
else if (layanan === "sku") {
  judul.innerText = "Formulir Surat Keterangan Usaha (SKU)";
  html = `
    <div class="mb-3"><label>📄 Upload KTP</label>
      <input type="file" class="form-control" required></div>

    <div class="mb-3"><label>🏪 Nama Usaha</label>
      <input type="text" class="form-control" required></div>

    <div class="mb-3"><label>📍 Alamat Usaha</label>
      <input type="text" class="form-control" required></div>
  `;
}

/* ================= Izin Tempat Usaha ================= */
else if (layanan === "itu") {
  judul.innerText = "Formulir Izin Tempat Usaha";
  html = `
    <div class="mb-3"><label>📄 Upload KTP</label>
      <input type="file" class="form-control" required></div>

    <div class="mb-3"><label>🏬 Lokasi Usaha</label>
      <input type="text" class="form-control" required></div>

    <div class="mb-3"><label>📄 Surat Sewa / Kepemilikan</label>
      <input type="file" class="form-control" required></div>
  `;
}

/* ================= REKOMENDASI ================= */
else if (layanan === "rekomendasi") {
  judul.innerText = "Formulir Rekomendasi Usaha dari Kelurahan";
  html = `
    <div class="mb-3"><label>📄 Upload KTP</label>
      <input type="file" class="form-control" required></div>

    <div class="mb-3"><label>🏪 Nama Usaha</label>
      <input type="text" class="form-control" required></div>

    <div class="mb-3"><label>📍 Alamat Usaha</label>
      <input type="text" class="form-control" required></div>
  `;
}

/* ================= PERPANJANGAN ================= */
else if (layanan === "perpanjangan") {
  judul.innerText = "Formulir Perpanjangan Izin Usaha";
  html = `
    <div class="mb-3"><label>📄 Upload KTP</label>
      <input type="file" class="form-control" required></div>

    <div class="mb-3"><label>📄 Upload Izin Lama</label>
      <input type="file" class="form-control" required></div>

    <div class="mb-3"><label>🏪 Nama Usaha</label>
      <input type="text" class="form-control" required></div>
  `;
}

else {
  judul.innerText = "Pilih layanan terlebih dahulu";
  html = `<p class="text-danger">Layanan tidak ditemukan</p>`;
}

uploadArea.innerHTML = html;

// submit
document.getElementById("formAjukan").addEventListener("submit", function(e){
e.preventDefault();

// Membuat nomor pengajuan otomatis
const sekarang = new Date();

const nomorPengajuan =
"KAPMM-" +
sekarang.getFullYear() +
String(sekarang.getMonth() + 1).padStart(2, '0') +
String(sekarang.getDate()).padStart(2, '0') +
"-" +
Math.floor(Math.random() * 1000)
.toString()
.padStart(3, '0');

// Menampilkan nomor pengajuan
document.getElementById("nomorPengajuan").innerText = nomorPengajuan;

// Menampilkan kotak notifikasi
document.getElementById("doneBox").style.display = "block";

// Scroll ke notifikasi
document.getElementById("doneBox").scrollIntoView({
behavior: "smooth"
});

// Reset form
this.reset();
});

// tombol reset menghilangkan notifikasi
document.querySelector('button[type="reset"]').addEventListener("click", function() {
document.getElementById("doneBox").style.display = "none";
});

</script>
 <!-- footer -->
      <footer class="p-5 mt-5">
        <div class="container">
          <div class="row">
            <div class="col text-center">
              <a href="#" class="text-decoration-none">
                <img src="https://i.pinimg.com/736x/0b/fc/ef/0bfcef8ad184d412c0fd43bfccb1cb42.jpg" style="width:30px; mix-blend-mode:multiply;">
              </a>
              <span>
                Copyright © 2026 | Created and Developed by
                <a href="https://www.instagram.com/kelompok12_5?igsh=ZW10aml1YmpqYnBz"
                  class="text-decoration-none text-dark fw-bold">Kelompok 12</a>
              </span>
            </div>
          </div>
        </div>
      </footer>


      <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO"
        crossorigin="anonymous"></script>
</body>
</html>
