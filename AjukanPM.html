<!DOCTYPE html>
<html lang="id">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ajukan Pengaduan</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#eaf3ff;
    font-family:Arial;
    padding:40px;
}

.box{
    max-width:850px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:12px;
}

.title{
    text-align:center;
    color:#0b3b7a;
}

.done{
    display:none;
    background:#d1e7dd;
    padding:15px;
    margin-top:10px;
    text-align:center;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="box">

<h3 class="title">Formulir Pengaduan</h3>

<form id="form">

<input class="form-control mb-2" placeholder="Nama (opsional)">
<input class="form-control mb-2" placeholder="NIK (opsional)">
<input class="form-control mb-2" placeholder="No HP (opsional)">

<input class="form-control mb-2" id="layanan" readonly>

<div class="mb-2">
    <input type="checkbox" id="anonim">
    <label>🔒 Kirim sebagai anonim</label>
</div>

<div id="upload"></div>

<button type="submit" class="btn btn-primary w-100 mt-2">
    Kirim
</button>

<button type="reset" class="btn btn-secondary w-100 mt-2">
    Reset
</button>

</form>

<div class="done" id="done"></div>

</div>

<script>

const l = new URLSearchParams(location.search).get("layanan");
document.getElementById("layanan").value = l;

let html = "";

if(l === "infrastruktur" || l === "lingkungan"){
    html = `<input type="file" class="form-control mb-2" required>`;
}
else if(l === "pelayanan" || l === "aspirasi"){
    html = `<textarea class="form-control mb-2" placeholder="Tuliskan pengaduan..." required></textarea>`;
}
else if(l === "tracking"){
    html = `<input type="text" class="form-control mb-2" placeholder="Nomor laporan" required>`;
}

document.getElementById("upload").innerHTML = html;

/* Membuat ID laporan */
function generateID(){
    return "PM-" + Date.now() + "-" + Math.floor(Math.random()*9000 + 1000);
}

/* Submit form */
document.getElementById("form").addEventListener("submit", function(e){

    e.preventDefault();

    const id = generateID();
    const anonim = document.getElementById("anonim").checked;

    document.getElementById("done").innerHTML =
    `✅ Laporan berhasil dikirim<br>
    📌 Nomor Laporan: <b>${id}</b><br>
    🔒 Status: ${anonim ? "Anonim" : "Teridentifikasi"}`;

    document.getElementById("done").style.display = "block";

    this.reset();
});

/* Tekan Enter pindah ke input berikutnya */
const inputs = document.querySelectorAll("#form input, #form textarea");

inputs.forEach((input, index) => {

    input.addEventListener("keydown", function(e){

        if(e.key === "Enter" && this.type !== "submit"){

            e.preventDefault();

            if(index + 1 < inputs.length){
                inputs[index + 1].focus();
            }
        }
    });

});

/* Reset juga menghilangkan notifikasi */
document.querySelector('button[type="reset"]').addEventListener("click", function(){

    document.getElementById("done").style.display = "none";
    document.getElementById("done").innerHTML = "";

});

</script>
 <!-- footer -->
      <footer class="p-5 mt-5">
        <div class="container">
          <div class="row">
            <div class="col text-center">
              <a href="#" class="text-decoration-none">

              </a>
              <span>

                  class="text-decoration-none text-dark fw-bold">Kelompok 12</a>
              </span>
            </div>
          </div>
        </div>
      </footer>


      <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO"
        crossorigin="anonymous"></script>
</body>
</html>
